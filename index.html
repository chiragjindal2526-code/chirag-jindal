<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator by Chirag | Free Online Web Tool</title>
    <meta name="description" content="Use this free, fast, and beautiful online web calculator built by Chirag for quick math calculations.">
    <meta name="keywords" content="online calculator, free web calculator, simple calculator, calculator by chirag">
    <meta name="google-site-verification" content="PASTE_YOUR_GOOGLE_CODE_HERE" />
    <link rel="stylesheet" href="Style.Css">
</head>
<body>
    <div class="calculator">
        <input type="text" placeholder="0" id="inputbox">
        <div>
            <button class="operator">ac</button>
            <button class="operator">del</button>
            <button class="operator">/</button>
            <button class="operator">%</button>
        </div>
        <div>
            <button class="operator">7</button>
            <button class="operator">8</button>
            <button class="operator">9</button>
            <button class="operator">4</button>
        </div>
        <div>
            <button class="operator">5</button>
            <button class="operator">6</button>
            <button class="operator">*</button>
            <button class="operator">1</button>
        </div>
        <div>
            <button class="operator">2</button>
            <button class="operator">3</button>
            <button class="operator">-</button>
            <button class="operator">0</button>
        </div>
        <div>
            <button class="operator">.</button>
            <button class="equals">=</button>
            <button class="operator">+</button>
            <button class="operator">00</button>
        </div> 
    </div>

    <script src="script.js"></script>
</body>
</html>
